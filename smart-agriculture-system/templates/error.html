{% extends "index.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card text-center animate-fade-in">
                <i class="fas fa-exclamation-triangle display-1 text-danger mb-4"></i>
                <h1 class="display-4">Error {{ code }}</h1>

                <div class="mt-4">

            </div>
        </div>
    </div>
</div>
{% endblock %}
