{% extends "index.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card animate-fade-in">
                <h2 class="text-center mb-4"><i class="fas fa-wheat text-warning me-2"></i>Crop Yield Prediction</h2>
                <form action="/predict-yield" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Crop Name</label>
                            <select class="form-select" name="crop" required>
                                <option value="Wheat" {% if input_data and input_data['crop'] == 'Wheat' %}selected{% endif %}>Wheat</option>
                                <option value="Rice" {% if input_data and input_data['crop'] == 'Rice' %}selected{% endif %}>Rice</option>
                                <option value="Maize" {% if input_data and input_data['crop'] == 'Maize' %}selected{% endif %}>Maize</option>
                                <option value="Sugarcane" {% if input_data and input_data['crop'] == 'Sugarcane' %}selected{% endif %}>Sugarcane</option>
                                <option value="Cotton" {% if input_data and input_data['crop'] == 'Cotton' %}selected{% endif %}>Cotton</option>
                                <option value="Soybean" {% if input_data and input_data['crop'] == 'Soybean' %}selected{% endif %}>Soybean</option>

                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Area (Hectares)</label>
                            <input type="number" step="0.1" class="form-control" name="area" required
                                placeholder="Example: 5.5" value="{{ input_data['area'] if input_data else '' }}">

                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Average Rainfall (mm)</label>
                            <input type="number" step="0.1" class="form-control" name="rainfall" required
                                placeholder="Example: 1200" value="{{ input_data['rainfall'] if input_data else '' }}">

                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Temperature (°C)</label>
                            <input type="number" step="0.1" class="form-control" name="temperature" required
                                placeholder="Example: 28" value="{{ input_data['temperature'] if input_data else '' }}">

                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-custom btn-lg">Predict Yield</button>
                    </div>
                </form>

                {% if result %}
                <div class="alert alert-info mt-4 text-center animate-fade-in" role="alert">
                    <h4 class="alert-heading">Predicted Yield</h4>
                    <p class="display-6">{{ result }} Tonnes</p>
                    <hr>
                    <p class="mb-0">{{ message }}</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
