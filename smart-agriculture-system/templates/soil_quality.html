{% extends "index.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card animate-fade-in">
                <h2 class="text-center mb-4"><i class="fas fa-layer-group text-secondary me-2"></i>Soil Quality Analysis
                </h2>
                <form action="/predict-soil" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nitrogen (N)</label>
                            <input type="number" step="0.1" class="form-control" name="nitrogen" required
                                placeholder="Example: 50" value="{{ input_data['nitrogen'] if input_data else '' }}">

                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phosphorus (P)</label>
                            <input type="number" step="0.1" class="form-control" name="phosphorus" required
                                placeholder="Example: 50" value="{{ input_data['phosphorus'] if input_data else '' }}">

                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Potassium (K)</label>
                            <input type="number" step="0.1" class="form-control" name="potassium" required
                                placeholder="Example: 50" value="{{ input_data['potassium'] if input_data else '' }}">

                        </div>
                        <div class="col-md-6">
                            <label class="form-label">pH Level (0-14)</label>
                            <input type="number" step="0.1" class="form-control" name="ph" required
                                placeholder="Example: 6.5" value="{{ input_data['ph'] if input_data else '' }}">

                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-custom btn-lg">Analyze Soil</button>
                    </div>
                </form>

                {% if result %}
                <div class="alert {{ 'alert-success' if result == 'Fertile' else 'alert-warning' }} mt-4 text-center animate-fade-in"
                    role="alert">
                    <h4 class="alert-heading">Soil Classification</h4>
                    <p class="display-6">{{ result }}</p>
                    <hr>
                    <p class="mb-0">{{ message }}</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
